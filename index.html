<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Podcast Player</title>
</head>
<body>
    <!-- Постоянная навигация — не пропадает при переходах между страницами -->
    <nav id="app-nav" class="app-nav"></nav>

    <!-- Сюда рендерятся "страницы" (главная / подкаст / плейлист) — содержимое перезаписывается -->
    <div id="page-content"></div>

    <!-- Плеер живёт здесь всегда, отдельно от страниц, и не перерисовывается при навигации -->
    <div id="player-bar"></div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
